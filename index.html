<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="משחק כדורגל בעברית לתרגול התפלגות נורמלית, ציון תקן, אחוזים וערכים על עקומת הפעמון."
    />
    <title>אליפות הפעמון</title>
    <link rel="stylesheet" href="styles.css?v=20260531-3" />
  </head>
  <body>
    <main class="app-shell">
      <section class="topbar" aria-label="מצב המשחק">
        <div class="brand-lockup">
          <img class="brand-visual" src="assets/soccer-stadium.svg" alt="אצטדיון כדורגל עם גביע וכדור" />
          <div>
            <p class="eyebrow">כדורגל וסטטיסטיקה</p>
            <h1>אליפות הפעמון</h1>
          </div>
        </div>
        <div class="score-strip" aria-live="polite">
          <span><strong id="scoreValue">0</strong> נקודות</span>
          <span><strong id="streakValue">0</strong> רצף</span>
          <span><strong id="accuracyValue">0%</strong> דיוק</span>
        </div>
      </section>

      <nav class="stage-tabs" aria-label="בחירת שלב">
        <button class="stage-tab active" type="button" data-stage="map"><span aria-hidden="true">⚽</span> מפת הפעמון</button>
        <button class="stage-tab" type="button" data-stage="z"><span aria-hidden="true">🎯</span> מכונת Z</button>
        <button class="stage-tab" type="button" data-stage="x"><span aria-hidden="true">📊</span> מציאת נתון</button>
        <button class="stage-tab" type="button" data-stage="boss"><span aria-hidden="true">🏆</span> גמר האלופות</button>
      </nav>

      <section class="game-layout">
        <section class="visual-panel" aria-label="עקומת הפעמון">
          <div class="stage-heading">
            <div>
              <p id="stageKicker" class="eyebrow">שלב 1</p>
              <h2 id="stageTitle">מפת הפעמון</h2>
            </div>
            <button id="resetButton" class="ghost-button" type="button">איפוס התקדמות</button>
          </div>
          <div id="bellGraph" class="bell-graph" aria-live="polite"></div>
          <div class="legend-row" aria-label="מקרא אחוזים">
            <span><i class="legend-swatch center"></i> מרכז הפעמון</span>
            <span><i class="legend-swatch selected"></i> האזור הנשאל</span>
            <span><i class="legend-swatch marker"></i> הערך בשאלה</span>
          </div>
        </section>

        <section class="question-panel" aria-label="שאלה">
          <div class="question-meta">
            <span id="scenarioBadge">ליגת האלופות</span>
            <span id="skillBadge">אחוזים</span>
          </div>
          <div id="questionData" class="known-data" aria-label="נתונים ידועים"></div>
          <p class="question-title">השאלה</p>
          <h2 id="questionText"></h2>

          <div id="answerArea" class="answer-area"></div>

          <div class="action-row">
            <button id="hintButton" class="secondary-button" type="button">רמז</button>
            <button id="checkButton" class="primary-button" type="button">בדיקה</button>
            <button id="nextButton" class="primary-button hidden" type="button">שאלה הבאה</button>
          </div>

          <div id="feedbackBox" class="feedback-box" aria-live="polite"></div>
        </section>
      </section>
    </main>

    <script src="app.js?v=20260531-3"></script>
  </body>
</html>
